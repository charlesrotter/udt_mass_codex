[pytest]
testpaths = tests
markers =
    slow: bounded solves / N-sweeps (anti-hang: single process, Nr<=16)
    documented_gap: characterization of the CURRENT live state; designed to FLIP when the
        operator/matter is migrated to the derived+native foundation (xfail strict=False ->
        XPASS on migration is the self-resolving tripwire). NOT a spurious failure.
# quiet, show xfail/xpass reasons
addopts = -ra
